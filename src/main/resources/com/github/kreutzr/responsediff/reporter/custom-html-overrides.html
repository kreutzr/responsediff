<style>
:root {
    --rd-header: #34495e;
    --rd-table-background-sub: #dbe4ed;
    --rd-table-font-color: #2c3e50;
    --rd-accent: #f39c12;
    --rd-border: #bdc3c7;
}

/* Haupt-Header des Reports */
#header {
    border-bottom: 5px solid var(--rd-header);
    padding-bottom: 1.5rem;
}

#header .details {
    color: var(--rd-border) !important;
    border: 0px;
    padding-bottom: 1.5rem;
}

h1, h2, h3 {
    color: var(--rd-header) !important;
}

/* --- Tabellen-Logik --- */

table.tableblock {
  margin-bottom: 0px;
}

/* 1. Der obere Tabellenkopf (thead) */
table.tableblock thead th {
    background: var(--rd-header) !important;
    color: #ffffff !important;
    border: 1px solid var(--rd-border) !important;
    border-right: 1px solid var(--rd-table-background-sub) !important;
    border-bottom: 3px solid var(--rd-accent) !important;
    padding: 12px 10px !important;
}

/* 2. Die th-Zellen im Body */
table.tableblock tbody tr th {
    background: var(--rd-table-background-sub) !important;
    color: var(--rd-table-font-color) !important;
    border: 1px solid var(--rd-border) !important;
    font-weight: 600;
}

/* 3. Normale Datenzellen (td) */
table.tableblock tbody tr td {
    border: 1px solid var(--rd-border) !important;
}

/* Listing / Code-Blöcke */
.listingblock pre.highlight {
    background-color: #f8fafd;
    border: 1px solid var(--rd-border);
    border-left: 5px solid var(--rd-accent);
}

/* Copy-Button */
.copy-btn {
    background: var(--rd-header) !important;
    color: white !important;
    border: none !important;
    padding: 4px 12px !important;
    border-radius: 4px !important;
    font-weight: bold !important;
}

.copy-btn:hover {
    background: var(--rd-accent) !important;
}

/* Footer */
#footer {
    background: var(--rd-header) !important;
    color: white !important;
}
#footer-text { color: white !important; opacity: 0.8; }
</style>
